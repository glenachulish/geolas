<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#2b2520" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Geòlas" />
  <title>Geòlas — field notebook</title>

  <!--
    PREFIX-AWARENESS: <base href> is set by app.js at runtime from the current
    URL, NOT hardcoded. Every other URL in this app (assets, fetch, map tiles)
    is relative, so the app works served at "/" locally or "/geolas/" on the Pi
    behind the Tailscale Funnel that strips the prefix. See PI-INFRASTRUCTURE.md.
  -->
  <link rel="stylesheet" href="vendor/leaflet.css" />
  <link rel="stylesheet" href="styles.css" />
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="icon" href="icons/icon.svg" type="image/svg+xml" />
  <link rel="apple-touch-icon" href="icons/icon-180.png" />
</head>
<body>
  <div id="app">
    <header class="masthead">
      <div class="masthead-inner">
        <div class="brand" id="brand-home" role="button" tabindex="0">
          <span class="brand-mark" aria-hidden="true"></span>
          <div class="brand-text">
            <h1>Geòlas</h1>
            <p class="brand-sub">field notebook</p>
          </div>
        </div>
        <nav class="mast-nav">
          <button id="nav-notebook" class="nav-btn nav-active">Notebook</button>
          <button id="nav-library" class="nav-btn">Library</button>
          <button id="new-site-btn" class="btn btn-primary">Log a site</button>
        </nav>
      </div>
      <div id="sync-bar" class="sync-bar" hidden>
        <span id="sync-status"></span>
        <button id="sync-now-btn" class="btn btn-sm">Sync now</button>
      </div>
    </header>

    <main id="view"><!-- views render here --></main>
  </div>

  <!-- Local vendored Leaflet — no runtime third-party script fetch. -->
  <script src="vendor/leaflet.js"></script>
  <script src="reference-sites.js"></script>
  <script src="knowledge-base.js"></script>
  <script src="offline-queue.js"></script>
  <script src="app.js" type="module"></script>
  <script>
    // Register the service worker at the app's own scope (works at / or /geolas/).
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => {
        const base = location.pathname.replace(/[^/]*$/, "");
        navigator.serviceWorker.register(base + "sw.js", { scope: base })
          .catch((e) => console.warn("SW registration failed:", e));
      });
    }
  </script>
</body>
</html>
